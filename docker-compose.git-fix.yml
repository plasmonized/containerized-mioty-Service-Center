version: '3.8'

services:
  bssci-service-center:
    build: .
    container_name: bssci-service-center
    user: "${UID:-1000}:${GID:-1000}"
    init: true
    ports:
      - "16019:16018"  # TLS Server port
      - "5056:5000"    # Web UI port
    volumes:
      - ./certs:/app/certs:ro
      - ./endpoints.json:/app/endpoints.json:rw
      - ./bssci_config.py:/app/bssci_config.py:rw
      - ./.env:/app/.env:rw
      - ./logs:/app/logs
      # GIT REPOSITORY VOLUME - FULL ACCESS
      - .:/app/repo:rw
      # Git configuration directory
      - ./.git:/app/repo/.git:rw
    # Synology-specific permission fixes
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    privileged: false
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      # GIT CONFIGURATION
      - GIT_CONFIG_GLOBAL=/app/.gitconfig
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-BSSCI Service}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-bssci@localhost}
      - GIT_COMMITTER_NAME=${GIT_COMMITTER_NAME:-BSSCI Service}
      - GIT_COMMITTER_EMAIL=${GIT_COMMITTER_EMAIL:-bssci@localhost}
      # Container user configuration
      - CONTAINER_UID=${UID:-1000}
      - CONTAINER_GID=${GID:-1000}
    networks:
      - bssci-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s1 = socket.create_connection(('localhost', 16018), timeout=5); s2 = socket.create_connection(('localhost', 5000), timeout=5); s1.close(); s2.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  bssci-network:
    driver: bridge